name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check # Biome lint + format
      - run: npm run typecheck
      - run: npm test # Vitest unit/integration
      - run: npm run build
      - run: npm run size # size-limit: shell within budget, no engine in entry
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e # Playwright: smoke + no-egress + axe
      - run: npm run lhci # Lighthouse CI: shell performance budget
