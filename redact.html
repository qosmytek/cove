<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cove Redact — redact a PDF on your device</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #17242e;
        --muted: #5a6b78;
        --accent: #3b6ea5;
        --accent-strong: #2f5c8c;
        --on-accent: #ffffff;
        --line: #3b6ea533;
        --surface: color-mix(in srgb, var(--accent) 5%, transparent);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #e6edf2;
          --muted: #9fb0bd;
          --accent: #6fa3df;
          --accent-strong: #8ab4e8;
          --on-accent: #0b1722;
          --line: #6fa3df3a;
          --surface: color-mix(in srgb, var(--accent) 12%, transparent);
        }
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        max-width: 40rem;
        margin: 0 auto;
        padding: 2.5rem 1.25rem 4rem;
        line-height: 1.55;
        color: var(--fg);
      }
      h1 { font-size: 1.6rem; margin: 0 0 0.25rem; letter-spacing: -0.01em; }
      .tagline { color: var(--muted); margin: 0 0 1.75rem; }
      .dropzone {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: 100%;
        min-height: 11rem;
        padding: 2rem;
        border: 2px dashed color-mix(in srgb, var(--accent) 45%, var(--line));
        border-radius: 12px;
        background: var(--surface);
        color: inherit;
        font: inherit;
        text-align: center;
        cursor: pointer;
      }
      .dropzone:hover, .dropzone:focus-visible { border-color: var(--accent); }
      .dropzone.dragover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
      .dz-icon { font-size: 1.75rem; color: var(--accent); }
      .dz-sub { color: var(--muted); font-size: 0.9rem; }
      .fileinfo { font-weight: 600; margin: 1.5rem 0 1rem; }
      .actions { display: flex; gap: 0.5rem; margin: 0.75rem 0; }
      button { font: inherit; }
      button.primary { padding: 0.55rem 1.4rem; font-weight: 600; border-radius: 8px; cursor: pointer; color: var(--on-accent); background: var(--accent); border: 1px solid var(--accent); }
      button.primary:hover, button.primary:focus-visible { background: var(--accent-strong); border-color: var(--accent-strong); }
      progress { width: 100%; height: 0.9rem; margin: 1rem 0 0.25rem; accent-color: var(--accent); }
      .status-msg { color: var(--muted); min-height: 1.4em; margin: 0.25rem 0; }
      .capability { color: var(--muted); font-size: 0.8rem; margin: 0.75rem 0; }
      .capability.warn { color: var(--fg); }
      details { margin-top: 2.5rem; border-top: 1px solid var(--line); padding-top: 1rem; color: var(--muted); font-size: 0.85rem; }
      details summary { cursor: pointer; }
      pre#log { background: #8881; padding: 0.5rem; max-height: 9rem; overflow: auto; font-size: 0.78rem; white-space: pre-wrap; }
      .pages { display: grid; gap: 1rem; margin: 1.25rem 0; }
      .page { margin: 0; }
      .page-wrap { position: relative; line-height: 0; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
      .page-wrap canvas { display: block; width: 100%; height: auto; }
      .page-marks { position: absolute; inset: 0; cursor: crosshair; touch-action: none; }
      .page-marks.whole { background: #000; }
      .mark { position: absolute; background: #000; }
      .mark:not(.preview) { cursor: pointer; }
      .mark.preview { background: #0008; outline: 1px solid #fff8; }
      .page-tools { display: flex; align-items: center; gap: 0.6rem; margin: 0.4rem 0 0; font-size: 0.85rem; color: var(--muted); }
      .page-tools .add-box { font: inherit; font-size: 0.85rem; padding: 0.2rem 0.6rem; color: inherit; background: transparent; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; }
      .page-tools .add-box:hover:not(:disabled), .page-tools .add-box:focus-visible { border-color: var(--accent); }
      .page-tools .add-box:disabled { opacity: 0.5; cursor: default; }
      .mark:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Cove Redact</h1>
      <p class="tagline">Black out a PDF on your device — nothing is uploaded.</p>
      <p id="capability-notice" class="capability" role="status" aria-live="polite" hidden></p>
      <div id="tool-host"></div>
    </main>
    <script type="module" src="/src/single-file/main.ts"></script>
  </body>
</html>
